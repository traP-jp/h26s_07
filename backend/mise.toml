[tools]
go = "1.26.4"

[tasks.init]
description = "バックエンドの依存関係を取得"
run = [
  "go mod download",
  "mise run gen:api",
]

[tasks."gen:api"]
description = "OpenAPI spec からバックエンド用の Go 型を生成"
run = "go tool oapi-codegen -config oapi-codegen.yaml ../openapi.yaml"

[tasks.dev]
description = "バックエンドを起動"
run = "go run ./cmd/server"

[tasks.fmt]
description = "Go ファイルを整形"
run = "gofmt -w ."

[tasks.lint]
description = "lint を実行"
run = "go vet ./..."

[tasks."db:migrate"]
description = "GORM AutoMigrate を DATABASE_URL に適用"
run = "go run ./cmd/migrate"

[tasks.test]
description = "テストを実行"
run = "go test ./..."

[tasks.docker-build]
description = "Docker image をビルド"
run = "docker build -t h26_07-backend:latest ."
