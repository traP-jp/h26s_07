[tools]
node = "24.17.0"
go = "1.26.4"

[tasks.init]
description = "開発環境を初期化"
run = [
  "mise --cd frontend run init",
  "mise --cd backend run init",
  "mise run hooks:install",
]

[tasks."hooks:install"]
description = "Git hooks を有効化"
run = "git config core.hooksPath .githooks"

[tasks."frontend:gen:api-schema"]
description = "フロントエンド用の API スキーマ型を生成"
run = "mise --cd frontend run gen:api-schema"

[tasks."backend:gen:api"]
description = "バックエンド用の API 型を生成"
run = "mise --cd backend run gen:api"

[tasks.codegen]
description = "OpenAPI spec から backend/frontend のコードを生成"
run = [
  "mise run backend:gen:api",
  "mise run frontend:gen:api-schema",
]

[tasks.frontend]
description = "フロントエンドを起動"
run = "mise --cd frontend run dev"

[tasks."frontend:mock"]
description = "モック API に接続してフロントエンドを起動"
run = "mise --cd frontend run mock"

[tasks.backend]
description = "デバッグ用 MariaDB を準備してバックエンドを起動"
run = [
  "mise run db:setup",
  "mise --cd backend run dev",
]

[tasks."db:up"]
description = "デバッグ用 MariaDB と Adminer を起動"
run = "docker compose up -d db adminer"

[tasks."db:wait"]
description = "デバッグ用 MariaDB の起動完了を待つ"
run = '''
for _ in $(seq 1 60); do
  if docker compose exec -T db mariadb-admin ping -h 127.0.0.1 -uh26_07 -ph26_07_password --silent >/dev/null 2>&1; then
    exit 0
  fi
  sleep 1
done

echo "database did not become ready in 60s" >&2
exit 1
'''

[tasks."db:migrate"]
description = "デバッグ用 MariaDB に GORM AutoMigrate を適用"
run = "mise --cd backend run db:migrate"

[tasks."db:setup"]
description = "デバッグ用 MariaDB と Adminer を起動して schema を作成"
run = [
  "mise run db:up",
  "mise run db:wait",
  "mise run db:migrate",
]

[tasks."db:down"]
description = "デバッグ用 MariaDB と Adminer を停止"
run = "docker compose down"

[tasks."db:reset"]
description = "デバッグ用 MariaDB の volume を削除して Adminer と一緒に作り直す"
run = [
  "docker compose down -v",
  "mise run db:setup",
]

[tasks."backend:test"]
description = "バックエンドのテストを実行"
run = "mise --cd backend run test"

[tasks."backend:fmt"]
description = "バックエンドの Go ファイルを整形"
run = "mise --cd backend run fmt"

[tasks."backend:lint"]
description = "バックエンドの lint を実行"
run = "mise --cd backend run lint"

[tasks."backend:docker-build"]
description = "バックエンドの Docker image をビルド"
run = "mise --cd backend run docker-build"
